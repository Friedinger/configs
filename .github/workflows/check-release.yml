name: Check and Release
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Check and Release {0}', github.event.inputs.version) || 'Check' }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to release (e.g., 1.2.3). The 'v' prefix is added automatically."
        required: true

jobs:
  actionlint:
    uses: RubberDuckCrew/.github/.github/workflows/action-actionlint.yml@30672d8a7c23d5931f89360cc50ce44a81337755 # v2.5.1

  codelint:
    name: Code Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run lint

  renovate:
    name: Validate Renovate Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Get Renovate config files
        id: config-files
        run: |
          set -euo pipefail
          files=$(git ls-files -- "renovate/*.json")
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "files<<$EOF"
            echo "$files"
            echo "$EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Renovate config
        uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          config_file_path: ${{ steps.config-files.outputs.files }}
          strict: true
        env:
          LOG_LEVEL: warn

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: [actionlint, codelint, renovate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Validate version input
        run: |
          if ! echo "$VERSION" | grep -E -x '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$' >/dev/null; then
            echo "ERROR: VERSION is not a valid semver: '$VERSION'"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "🔖 Configs ${{ env.VERSION }}"
          draft: true
          prerelease: false
