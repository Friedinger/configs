name: Sync labels

on:
  workflow_call:
    inputs:
      additional-config:
        description: "Additional config file in the repo"
        required: false
        type: string

permissions:
  issues: write

jobs:
  labels:
    name: Sync labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout additional config
        if: ${{ inputs.additional-config }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          sparse-checkout: ${{ inputs.additional-config }}

      - name: Sync labels
        uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2.3.3
        with:
          config-file: |
            https://raw.githubusercontent.com/Friedinger/configs/refs/heads/main/conventions/labels.yml
            ${{ inputs.additional-config }}
          delete-other-labels: true
