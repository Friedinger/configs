name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  actionlint:
    uses: RubberDuckCrew/.github/.github/workflows/action-actionlint.yml@3408baf8692c80185b2f791f8faf0863cead19a2

  codelint:
    name: Code Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run lint
